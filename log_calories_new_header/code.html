<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-highest": "#353535",
              "on-tertiary": "#1b1c1c",
              "on-surface-variant": "#c6c6c6",
              "primary": "#ffffff",
              "on-primary-fixed-variant": "#e2e2e2",
              "inverse-on-surface": "#303030",
              "surface-variant": "#353535",
              "on-tertiary-container": "#000000",
              "error-container": "#93000a",
              "outline-variant": "#474747",
              "inverse-primary": "#5d5f5f",
              "tertiary-container": "#919090",
              "surface-container": "#1f1f1f",
              "error": "#ffb4ab",
              "on-secondary-fixed": "#1b1c1c",
              "background": "#131313",
              "secondary-container": "#474746",
              "surface": "#131313",
              "on-tertiary-fixed-variant": "#e4e2e1",
              "on-tertiary-fixed": "#ffffff",
              "surface-container-high": "#2a2a2a",
              "surface-tint": "#c6c6c7",
              "outline": "#919191",
              "primary-container": "#d4d4d4",
              "secondary-fixed-dim": "#adabaa",
              "tertiary-fixed": "#5f5e5e",
              "secondary": "#c8c6c5",
              "on-secondary-fixed-variant": "#3c3b3b",
              "on-surface": "#e2e2e2",
              "secondary-fixed": "#c8c6c5",
              "on-primary-fixed": "#ffffff",
              "primary-fixed": "#5d5f5f",
              "primary-fixed-dim": "#454747",
              "surface-bright": "#393939",
              "on-secondary-container": "#e5e2e1",
              "on-error": "#690005",
              "on-primary": "#1a1c1c",
              "inverse-surface": "#e2e2e2",
              "on-secondary": "#1b1c1c",
              "surface-dim": "#131313",
              "on-primary-container": "#000000",
              "tertiary": "#e4e2e1",
              "surface-container-lowest": "#0e0e0e",
              "surface-container-low": "#1b1b1b",
              "on-error-container": "#ffdad6",
              "on-background": "#e2e2e2",
              "tertiary-fixed-dim": "#474747"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="bg-black text-white antialiased">
<!-- Updated TopAppBar based on COMPONENTS_22 -->
<header class="fixed top-0 w-full z-50 bg-black/60 backdrop-blur-xl flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center w-12">
<span class="material-symbols-outlined text-white hover:opacity-80 transition-opacity active:scale-95 duration-200 cursor-pointer">menu</span>
</div>
<h2 class="text-[10px] font-bold uppercase tracking-[0.2em] text-white absolute left-1/2 -translate-x-1/2">Log</h2>
<div class="flex items-center justify-end w-12">
<h1 class="text-xl font-black tracking-tighter text-white uppercase font-['Inter']">Kiné</h1>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto">
<!-- Tab Navigation (Preserved Style) -->
<nav class="flex items-end justify-start gap-8 mb-12 overflow-x-auto hide-scrollbar border-b border-white/5">
<button class="pb-4 text-zinc-500 font-bold text-[10px] uppercase tracking-[0.2em] hover:text-white transition-colors">Weights</button>
<button class="pb-4 text-zinc-500 font-bold text-[10px] uppercase tracking-[0.2em] hover:text-white transition-colors">Cardio</button>
<button class="pb-4 text-white font-bold text-[10px] uppercase tracking-[0.2em] border-b-2 border-white">Calories</button>
</nav>
<!-- Section: Daily Calorie Input & Rating -->
<section class="mb-16">
<div class="space-y-12">
<div>
<label class="block text-[10px] uppercase tracking-[0.2em] text-zinc-500 font-bold mb-4">Total Calories</label>
<input class="w-full bg-transparent border-none p-0 text-7xl font-black tracking-tighter text-white focus:ring-0 placeholder:text-zinc-800" placeholder="0000" type="number" value="1420"/>
<span class="text-zinc-500 text-[10px] font-bold uppercase tracking-[0.2em] mt-2 block">kcal today</span>
</div>
<div>
<label class="block text-[10px] uppercase tracking-[0.2em] text-zinc-500 font-bold mb-4">Food Rating</label>
<div class="flex gap-2">
<button class="flex-1 py-4 rounded-lg bg-[#121212] border border-white/5 text-[10px] font-bold uppercase tracking-widest text-zinc-500 hover:text-white hover:border-white/20 transition-all">Bad</button>
<button class="flex-1 py-4 rounded-lg bg-[#121212] border border-white/40 text-[10px] font-bold uppercase tracking-widest text-white transition-all">Ok</button>
<button class="flex-1 py-4 rounded-lg bg-[#121212] border border-white/5 text-[10px] font-bold uppercase tracking-widest text-zinc-500 hover:text-white hover:border-white/20 transition-all">Good</button>
</div>
</div>
</div>
</section>
<!-- Section: Performance Trends -->
<section class="mb-16">
<h3 class="text-[10px] font-bold uppercase tracking-[0.3em] text-zinc-500 mb-8">Performance Trends</h3>
<div class="space-y-10">
<!-- Weekly Bar Chart -->
<div>
<span class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest mb-4 block">Calories: This Week</span>
<div class="flex items-end justify-between h-32 gap-2">
<div class="flex-1 bg-zinc-900 rounded-sm h-[60%]"></div>
<div class="flex-1 bg-zinc-900 rounded-sm h-[45%]"></div>
<div class="flex-1 bg-zinc-900 rounded-sm h-[80%]"></div>
<div class="flex-1 bg-zinc-800 rounded-sm h-[95%]"></div>
<div class="flex-1 bg-zinc-900 rounded-sm h-[70%]"></div>
<div class="flex-1 bg-zinc-900 rounded-sm h-[55%]"></div>
<div class="flex-1 bg-white rounded-sm h-[75%]"></div>
</div>
<div class="flex justify-between mt-2 text-[8px] font-bold text-zinc-600 uppercase tracking-tighter">
<span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
</div>
</div>
<!-- Monthly Line/Bar Summary -->
<div>
<span class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest mb-4 block">Calories: This Month</span>
<div class="flex items-end justify-between h-16 gap-1">
<div class="flex-1 bg-zinc-900/50 rounded-t-sm h-[30%]"></div>
<div class="flex-1 bg-zinc-900/50 rounded-t-sm h-[40%]"></div>
<div class="flex-1 bg-zinc-900/50 rounded-t-sm h-[35%]"></div>
<div class="flex-1 bg-zinc-800 rounded-t-sm h-[60%]"></div>
<div class="flex-1 bg-zinc-900/50 rounded-t-sm h-[55%]"></div>
<div class="flex-1 bg-zinc-900/50 rounded-t-sm h-[45%]"></div>
<div class="flex-1 bg-zinc-800 rounded-t-sm h-[70%]"></div>
<div class="flex-1 bg-zinc-900/50 rounded-t-sm h-[65%]"></div>
<div class="flex-1 bg-zinc-900/50 rounded-t-sm h-[50%]"></div>
<div class="flex-1 bg-zinc-900/50 rounded-t-sm h-[40%]"></div>
<div class="flex-1 bg-white rounded-t-sm h-[80%]"></div>
<div class="flex-1 bg-zinc-800 rounded-t-sm h-[75%]"></div>
<div class="flex-1 bg-zinc-900/50 rounded-t-sm h-[60%]"></div>
<div class="flex-1 bg-zinc-900/50 rounded-t-sm h-[50%]"></div>
<div class="flex-1 bg-zinc-900/50 rounded-t-sm h-[45%]"></div>
</div>
</div>
</div>
</section>
<!-- Section: Body Measurements Log -->
<section class="mb-8">
<h3 class="text-[10px] font-bold uppercase tracking-[0.3em] text-zinc-500 mb-6">Body Measurements</h3>
<div class="grid grid-cols-1 gap-4">
<div class="flex justify-between items-center p-5 bg-[#121212] rounded-lg group border border-white/5">
<label class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Body Weight (KG)</label>
<input class="bg-transparent border-none text-right text-lg font-black tracking-tight text-white focus:ring-0 p-0 w-24" step="0.1" type="number" value="78.5"/>
</div>
<div class="flex justify-between items-center p-5 bg-[#121212] rounded-lg group border border-white/5">
<label class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Body Fat (%)</label>
<input class="bg-transparent border-none text-right text-lg font-black tracking-tight text-white focus:ring-0 p-0 w-24" step="0.1" type="number" value="14.2"/>
</div>
<div class="flex justify-between items-center p-5 bg-[#121212] rounded-lg group border border-white/5">
<label class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Muscle Mass (KG)</label>
<input class="bg-transparent border-none text-right text-lg font-black tracking-tight text-white focus:ring-0 p-0 w-24" step="0.1" type="number" value="64.1"/>
</div>
</div>
<button class="w-full bg-white text-black font-black uppercase tracking-widest text-[10px] py-5 rounded-full mt-8 hover:opacity-90 active:scale-[0.98] transition-all">
                Update Metrics
            </button>
</section>
</main>
<!-- BottomNavBar from COMPONENTS_19 -->
<nav class="fixed bottom-0 left-0 w-full h-24 flex justify-around items-center px-8 pb-6 bg-zinc-900/60 backdrop-blur-2xl z-50 rounded-t-2xl shadow-[0_-12px_32px_rgba(0,0,0,0.4)]">
<a class="flex flex-col items-center justify-center text-zinc-400 py-2 hover:text-white transition-colors active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined mb-1">grid_view</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-[0.2em] font-bold">Summary</span>
</a>
<a class="flex flex-col items-center justify-center bg-white text-zinc-950 rounded-full px-6 py-2 scale-105 transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">add_box</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-[0.2em] font-bold">Log</span>
</a>
<a class="flex flex-col items-center justify-center text-zinc-400 py-2 hover:text-white transition-colors active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined mb-1">equalizer</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-[0.2em] font-bold">Analytics</span>
</a>
</nav>
</body></html>
